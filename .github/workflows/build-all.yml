name: Compilation Multiplateforme (Mac et Linux)

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permet de relancer la compilation manuellement au besoin

jobs:
  # --- COMPILATION POUR MAC ---
  build-macos:
    runs-on: macos-latest
    steps:
    - name: Recuperer le code
      uses: actions/checkout@v4

    - name: Installer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installer les dependances
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 pyinstaller

    - name: Compiler avec PyInstaller (.app unique)
      run: |
        pyinstaller --onefile --windowed --name="Untardle" main.py

    - name: Telecharger le package Mac
      uses: actions/upload-artifact@v4
      with:
        name: Untardle-Mac-App
        path: dist/Untardle.app

  # --- COMPILATION POUR LINUX (.DEB) ---
  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
    - name: Recuperer le code
      uses: actions/checkout@v4

    - name: Installer Python et outils systeme
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip python3-setuptools
        
    - name: Installer les dependances Python
      run: |
        python3 -m pip install --upgrade pip
        pip3 install PyQt5 pyinstaller

    - name: Compiler avec PyInstaller (Binaire Linux unique)
      run: |
        pyinstaller --onefile --windowed --name="untardle" main.py

    - name: Creer la structure du paquet .deb
      run: |
        mkdir -p package/usr/local/bin
        mkdir -p package/DEBIAN
        cp dist/untardle package/usr/local/bin/untardle
        
        # Generation du fichier control indispensable pour le .deb
        echo "Package: untardle" > package/DEBIAN/control
        echo "Version: 1.0" >> package/DEBIAN/control
        echo "Architecture: amd64" >> package/DEBIAN/control
        echo "Maintainer: OpenSource <opensource@example.com>" >> package/DEBIAN/control
        echo "Description: Outil d archivage et de desarchivage Untardle" >> package/DEBIAN/control
        
        # Fabrication du fichier .deb final
        dpkg-deb --build package untardle.deb

    - name: Telecharger le fichier .deb Linux
      uses: actions/upload-artifact@v4
      with:
        name: Untardle-Linux-Deb
        path: untardle.deb
